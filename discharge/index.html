<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discharge Center - โรงพยาบาลสันกำแพง</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <i class="fas fa-hospital"></i>
        <div class="logo-text">
          <span class="logo-title">Discharge Center</span>
          <span class="logo-subtitle">รพ.สันกำแพง</span>
        </div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">หน้าหลัก</div>
        <a href="#" class="nav-item active" data-page="dashboard">
          <i class="fas fa-chart-pie"></i>
          <span>แดชบอร์ด</span>
        </a>
      </div>

      <div class="nav-section">
        <div class="nav-section-title">Discharge Center</div>
        <a href="#" class="nav-item" data-page="inpatients">
          <i class="fas fa-bed"></i>
          <span>ผู้ป่วยในปัจจุบัน</span>
          <span class="nav-badge" id="badge-inpatients">8</span>
        </a>
        <a href="#" class="nav-item" data-page="discharge-planning">
          <i class="fas fa-clipboard-list"></i>
          <span>วางแผนจำหน่าย</span>
        </a>
        <a href="#" class="nav-item" data-page="pending-discharge">
          <i class="fas fa-check-circle"></i>
          <span>รอจำหน่าย</span>
          <span class="nav-badge badge-success" id="badge-pending">3</span>
        </a>
      </div>

      <div class="nav-section">
        <div class="nav-section-title">ติดตามผล</div>
        <a href="#" class="nav-item" data-page="follow-up">
          <i class="fas fa-phone-alt"></i>
          <span>ติดตามหลังจำหน่าย</span>
          <span class="nav-badge badge-warning" id="badge-followup">2</span>
        </a>
        <a href="#" class="nav-item" data-page="home-visit">
          <i class="fas fa-home"></i>
          <span>เยี่ยมบ้าน</span>
        </a>
        <a href="#" class="nav-item" data-page="reports">
          <i class="fas fa-chart-bar"></i>
          <span>รายงาน/สถิติ</span>
        </a>
      </div>

      <div class="nav-section">
        <div class="nav-section-title">แผนกอื่นๆ</div>
        <a href="#" class="nav-item" data-page="opd">
          <i class="fas fa-walking"></i>
          <span>OPD ผู้ป่วยนอก</span>
        </a>
        <a href="#" class="nav-item" data-page="er">
          <i class="fas fa-ambulance"></i>
          <span>ER ฉุกเฉิน</span>
        </a>
        <a href="#" class="nav-item" data-page="ward">
          <i class="fas fa-procedures"></i>
          <span>หอผู้ป่วย</span>
        </a>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">
          <i class="fas fa-user-nurse"></i>
        </div>
        <div class="user-detail">
          <span class="user-name">พว.สุดา ใจงาม</span>
          <span class="user-role">Discharge Center</span>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Top Header -->
    <header class="top-header">
      <div class="header-left">
        <button class="menu-toggle" id="menuToggle">
          <i class="fas fa-bars"></i>
        </button>
        <div class="breadcrumb">
          <span class="breadcrumb-item" id="breadcrumb-text">แดชบอร์ด</span>
        </div>
      </div>
      <div class="header-right">
        <div class="header-date">
          <i class="fas fa-calendar-alt"></i>
          <span id="current-date"></span>
        </div>
        <div class="notification-bell" id="notificationBell">
          <i class="fas fa-bell"></i>
          <span class="notification-count" id="notificationCount">2</span>
        </div>
      </div>
    </header>

    <!-- Notification Panel -->
    <div class="notification-panel" id="notificationPanel">
      <div class="notification-panel-header">
        <h3>การแจ้งเตือน</h3>
        <button class="btn-text" id="markAllRead">อ่านทั้งหมด</button>
      </div>
      <div class="notification-list" id="notificationList"></div>
    </div>

    <!-- Page Content Container -->
    <div class="page-content" id="pageContent">
      <!-- Content will be rendered by JS -->
    </div>
  </main>

  <!-- Modal Overlay -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent">
      <!-- Modal content rendered by JS -->
    </div>
  </div>

  <!-- Mobile Sidebar Overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <script src="js/mock-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
